# Nginx reverse proxy — wa-gateway.masedo.my.id
# Route: https://wa-gateway.masedo.my.id → http://127.0.0.1:8081

server {
    listen 80;
    server_name wa-gateway.masedo.my.id;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wa-gateway.masedo.my.id;

    # SSL — dikelola Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/wa-gateway.masedo.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa-gateway.masedo.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy ke frontend container (Nginx dalam Docker)
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache bypass untuk HTML (SPA routing)
        proxy_cache_bypass $http_upgrade;
    }
}
