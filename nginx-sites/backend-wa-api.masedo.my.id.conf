# Nginx reverse proxy — backend-wa-api.masedo.my.id
# Route: https://backend-wa-api.masedo.my.id → http://127.0.0.1:3010

server {
    listen 80;
    server_name backend-wa-api.masedo.my.id;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name backend-wa-api.masedo.my.id;

    # SSL — dikelola Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/backend-wa-api.masedo.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend-wa-api.masedo.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Ukuran body (untuk upload/payload besar)
    client_max_body_size 10M;

    # Proxy ke backend container
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;

        # Penting untuk WebSocket (Socket.IO)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout lebih panjang untuk koneksi WhatsApp
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;
    }
}
